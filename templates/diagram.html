<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
{{FONTS}}
{{BRAND_CSS}}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1080px; overflow: hidden; }
body { font-family: var(--sans); }
.canvas { position: relative; width: 1080px; height: 1080px; padding: 88px 96px; display: flex; flex-direction: column; }
.eyebrow { font-size: 21px; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase; color: var(--gold-muted); }
.title { font-family: var(--serif); font-weight: 600; font-size: 54px; line-height: 1.1; margin: 22px 0 40px; }
.footer { display: flex; align-items: center; gap: 24px; }
.rule { width: 64px; height: 2px; background: var(--gold); }
.wordmark { font-size: 21px; font-weight: 600; letter-spacing: 0.34em; }

/* ---- columns mode: side-by-side comparison on light canvas ---- */
body.columns { background: var(--ivory); color: var(--forest); }
body.columns .frame { position: absolute; inset: 34px; border: 1px solid rgba(21, 51, 37, 0.18); pointer-events: none; }
body.columns .wordmark { color: var(--forest); }
.cols { flex: 1; display: flex; gap: 28px; position: relative; margin-bottom: 44px; }
.col { flex: 1; border-radius: 4px; padding: 44px 40px; display: flex; flex-direction: column; }
.col .label { font-size: 24px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 30px; }
.col .rows { display: flex; flex-direction: column; gap: 22px; }
.col .row { display: flex; gap: 18px; align-items: baseline; font-size: 29px; line-height: 1.3; }
.col .bullet { width: 14px; height: 14px; flex: 0 0 14px; transform: translateY(-1px); }
.col.left { background: var(--cream-dark); color: var(--forest-light); }
.col.left .label { color: var(--gold-muted); }
.col.left .bullet { background: rgba(21, 51, 37, 0.3); }
.col.right { background: var(--forest); color: var(--cream); box-shadow: 0 8px 30px -6px rgba(21, 51, 37, 0.25); }
.col.right .label { color: var(--gold); }
.col.right .bullet { background: var(--gold); }
.vs { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 84px; height: 84px; border-radius: 50%; background: var(--ivory); border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: var(--serif); font-style: italic; font-weight: 600; font-size: 32px; color: var(--gold-muted); }

/* ---- circles mode: concentric Golden Circle on dark canvas ---- */
body.circles { background: radial-gradient(120% 120% at 50% 0%, var(--forest) 0%, var(--forest-dark) 65%); color: var(--cream); }
body.circles .wordmark { color: var(--gold); }
.circle-stage { flex: 1; position: relative; margin-bottom: 30px; }
.ring { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); border-radius: 50%; }
.ring.outer { width: 660px; height: 660px; border: 2px solid rgba(172, 147, 83, 0.7); }
.ring.middle { width: 452px; height: 452px; border: 2px solid var(--gold-light); }
.ring.inner { width: 244px; height: 244px; background: var(--gold); display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring.inner .c-label { font-family: var(--serif); font-weight: 700; font-size: 52px; color: var(--forest-dark); line-height: 1; }
.ring.inner .c-sub { font-size: 19px; font-weight: 600; color: var(--forest); margin-top: 8px; max-width: 190px; text-align: center; line-height: 1.25; }
.band { position: absolute; left: 50%; transform: translateX(-50%); text-align: center; }
.band .c-label { font-family: var(--serif); font-weight: 700; font-size: 38px; line-height: 1; }
.band .c-sub { font-size: 19px; margin-top: 6px; line-height: 1.25; }
.band.middle-band { color: var(--gold-light); }
.band.outer-band { color: var(--gold-muted); }
</style>
</head>
<body class="{{MODE}}">
  <div class="canvas">
    <div class="frame"></div>
    <div class="eyebrow">{{EYEBROW}}</div>
    <div class="title">{{TITLE}}</div>
    {{DIAGRAM_CONTENT}}
    <div class="footer"><div class="rule"></div><div class="wordmark">{{WORDMARK}}</div></div>
  </div>
</body>
</html>
