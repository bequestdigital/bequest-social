<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
{{FONTS}}
{{BRAND_CSS}}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1080px; overflow: hidden; }
body { font-family: var(--sans); background: var(--ivory); color: var(--forest); }
.canvas { position: relative; width: 1080px; height: 1080px; padding: 96px; display: flex; flex-direction: column; }
.frame { position: absolute; inset: 34px; border: 1px solid rgba(21, 51, 37, 0.18); pointer-events: none; }
.topbar { position: absolute; top: 34px; left: 34px; right: 34px; height: 8px; background: var(--forest); }
.eyebrow { font-size: 21px; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase; color: var(--gold-muted); }
.title { font-family: var(--serif); font-weight: 600; color: var(--forest); margin: 24px 0 14px; line-height: 1.08; }
.title.t-lg { font-size: 64px; }
.title.t-md { font-size: 54px; }
.items { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.item { display: flex; align-items: baseline; gap: 28px; padding: 15px 0; border-bottom: 1px solid var(--cream-dark); }
.item:last-child { border-bottom: none; }
.item .num { font-family: var(--serif); font-weight: 700; color: var(--gold); min-width: 56px; text-align: right; }
.item .text { color: var(--forest-light); font-weight: 400; line-height: 1.3; }
.items.i-lg .num { font-size: 46px; } .items.i-lg .text { font-size: 34px; }
.items.i-md .num { font-size: 40px; } .items.i-md .text { font-size: 30px; }
.items.i-sm .num { font-size: 34px; } .items.i-sm .text { font-size: 26px; }
.footer { display: flex; align-items: center; gap: 24px; }
.rule { width: 64px; height: 2px; background: var(--gold); }
.wordmark { font-size: 21px; font-weight: 600; letter-spacing: 0.34em; color: var(--forest); }
</style>
</head>
<body>
  <div class="canvas">
    <div class="frame"></div>
    <div class="topbar"></div>
    <div class="eyebrow">{{EYEBROW}}</div>
    <div class="title {{TITLE_CLASS}}">{{TITLE}}</div>
    <div class="items {{ITEMS_CLASS}}">{{ITEMS}}</div>
    <div class="footer"><div class="rule"></div><div class="wordmark">{{WORDMARK}}</div></div>
  </div>
</body>
</html>
