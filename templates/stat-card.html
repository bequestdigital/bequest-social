<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
{{FONTS}}
{{BRAND_CSS}}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1080px; overflow: hidden; }
body {
  font-family: var(--sans);
  background: radial-gradient(120% 120% at 80% 0%, var(--forest) 0%, var(--forest-dark) 62%);
  color: var(--cream);
}
.canvas { position: relative; width: 1080px; height: 1080px; padding: 110px 96px 96px; display: flex; flex-direction: column; }
.frame { position: absolute; inset: 34px; border: 1px solid rgba(203, 168, 77, 0.4); pointer-events: none; }
.eyebrow { font-size: 21px; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase; color: var(--gold-muted); }
.main { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.stat { font-family: var(--serif); font-weight: 700; color: var(--gold); line-height: 0.95; }
.stat.s-xl { font-size: 260px; }
.stat.s-lg { font-size: 190px; }
.stat.s-md { font-size: 140px; }
.label { font-family: var(--serif); font-weight: 600; font-size: 48px; color: var(--cream); margin-top: 26px; line-height: 1.15; }
.context { font-size: 30px; color: var(--cream-dark); margin-top: 30px; line-height: 1.5; max-width: 800px; }
.footer { display: flex; align-items: center; gap: 24px; }
.rule { width: 64px; height: 2px; background: var(--gold); }
.wordmark { font-size: 21px; font-weight: 600; letter-spacing: 0.34em; color: var(--gold); }
</style>
</head>
<body>
  <div class="canvas">
    <div class="frame"></div>
    <div class="eyebrow">{{EYEBROW}}</div>
    <div class="main">
      <div class="stat {{STAT_CLASS}}">{{STAT}}</div>
      <div class="label">{{LABEL}}</div>
      <div class="context">{{CONTEXT}}</div>
    </div>
    <div class="footer"><div class="rule"></div><div class="wordmark">{{WORDMARK}}</div></div>
  </div>
</body>
</html>
