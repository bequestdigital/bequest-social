<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
{{FONTS}}
{{BRAND_CSS}}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1080px; overflow: hidden; }
body { font-family: var(--sans); }
.canvas { position: relative; width: 1080px; height: 1080px; padding: 96px; display: flex; flex-direction: column; }
.frame { position: absolute; inset: 34px; border: 1px solid rgba(203, 168, 77, 0.4); pointer-events: none; }
.eyebrow { font-size: 21px; font-weight: 600; letter-spacing: 0.32em; text-transform: uppercase; color: var(--gold-muted); }
.footer { display: flex; align-items: center; justify-content: space-between; }
.brandline { display: flex; align-items: center; gap: 24px; }
.rule { width: 64px; height: 2px; background: var(--gold); }
.wordmark { font-size: 21px; font-weight: 600; letter-spacing: 0.34em; }
.logo { height: 44px; }
.dots { display: flex; gap: 12px; }
.dot { width: 12px; height: 12px; border-radius: 50%; }

/* cover + end: dark canvas */
body.cover, body.end { background: radial-gradient(120% 120% at 20% 0%, var(--forest) 0%, var(--forest-dark) 62%); color: var(--cream); }
body.cover .wordmark, body.end .wordmark { color: var(--gold); }
body.cover .dot, body.end .dot { background: rgba(246, 244, 238, 0.25); }
body.cover .dot.on, body.end .dot.on { background: var(--gold); }
.cover-main { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.cover-title { font-family: var(--serif); font-weight: 600; font-size: 82px; line-height: 1.1; }
.cover-sub { margin-top: 34px; font-size: 32px; color: var(--cream-dark); line-height: 1.4; max-width: 780px; }
.swipe { margin-top: 48px; font-size: 24px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); }

/* item slides: light canvas */
body.item { background: var(--ivory); color: var(--forest); }
body.item .frame { border-color: rgba(21, 51, 37, 0.18); }
body.item .wordmark { color: var(--forest); }
body.item .dot { background: var(--cream-dark); }
body.item .dot.on { background: var(--gold); }
.slide-num { font-family: var(--serif); font-weight: 700; font-size: 110px; color: var(--gold); line-height: 1; margin-top: 40px; }
.slide-main { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.slide-title { font-family: var(--serif); font-weight: 600; font-size: 58px; line-height: 1.12; color: var(--forest); }
.slide-body { margin-top: 30px; font-size: 33px; line-height: 1.45; color: var(--forest-light); max-width: 820px; }

.end-main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; }
.end-title { font-family: var(--serif); font-weight: 600; font-size: 68px; line-height: 1.12; }
.end-sub { margin-top: 30px; font-size: 31px; color: var(--cream-dark); line-height: 1.45; max-width: 800px; }
</style>
</head>
<body class="{{MODE}}">
  <div class="canvas">
    <div class="frame"></div>
    <div class="eyebrow">{{EYEBROW}}</div>
    {{SLIDE_CONTENT}}
    <div class="footer">
      {{BRANDMARK}}
      <div class="dots">{{DOTS}}</div>
    </div>
  </div>
</body>
</html>
