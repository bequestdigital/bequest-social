# Mon/Wed/Fri 9:00am ET: publish content/approved/{today}.json if it exists.
# Fires at both DST candidate UTC hours; a gate step lets only real 9am ET run.
name: Publish

on:
  schedule:
    - cron: '0 13 * * 1,3,5' # 9am EDT
    - cron: '0 14 * * 1,3,5' # 9am EST
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to publish (YYYY-MM-DD). Empty = today ET.'
        required: false
        default: ''
      only:
        description: 'Comma-separated platforms to publish (fb,ig,x). Empty = all.'
        required: false
        default: ''

permissions:
  contents: write
  issues: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: DST gate — proceed only at 9am ET (or manual dispatch)
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$(TZ=America/New_York date +%H)" = "09" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not 9am ET — this is the other DST candidate slot. Exiting."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.go == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.go == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.gate.outputs.go == 'true'
        run: npm ci

      - name: Publish
        id: publish
        if: steps.gate.outputs.go == 'true'
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          [ -n "${{ inputs.date }}" ] && ARGS="$ARGS --date ${{ inputs.date }} --force"
          [ -n "${{ inputs.only }}" ] && ARGS="$ARGS --only ${{ inputs.only }}"
          node src/publish.js $ARGS 2>&1 | tee publish.log
          exit ${PIPESTATUS[0]}

      # Commit state even when a platform failed — successful post IDs must be
      # recorded so a retry never double-posts.
      - name: Commit publish state
        if: always() && steps.gate.outputs.go == 'true'
        run: |
          git config user.name "bequest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A content/
          git diff --cached --quiet || (git commit -m "Publish state $(TZ=America/New_York date +%Y-%m-%d) [skip ci]" && git push)

      # Friday runs: post the weekly summary issue after publishing.
      - name: Weekly summary (Fridays)
        if: steps.gate.outputs.go == 'true' && github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$(TZ=America/New_York date +%u)" = "5" ]; then
            node src/notify.js summary || true
          fi

      - name: Upload run log
        if: always() && steps.gate.outputs.go == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: publish-log-${{ github.run_id }}
          path: publish.log
          if-no-files-found: ignore
